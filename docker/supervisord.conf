[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:backend]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='127.0.0.1'
directory=/app
user=dockervault
autostart=true
autorestart=true
# Allow long-running backups to drain on SIGTERM. Default is 10s, which
# is far too short for media-volume backups that can take hours. Docker's
# ``stop_grace_period`` and our app's ``SHUTDOWN_TIMEOUT`` must agree.
stopwaitsecs=86400
stopasgroup=true
killasgroup=true
startsecs=5
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stopwaitsecs=30
stopasgroup=true
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
