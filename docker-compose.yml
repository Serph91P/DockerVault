services:
  dockervault:
    image: ghcr.io/serph91p/dockervault:latest
    container_name: dockervault
    restart: unless-stopped
    # Run as root to access Docker volumes (required for backup functionality)
    # This is necessary because Docker volumes are owned by root
    user: root
    environment:
      - TZ=${TZ:-Europe/Berlin}
      # Security
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - ALLOWED_HOOK_COMMANDS=${ALLOWED_HOOK_COMMANDS:-pg_dump,pg_dumpall,mysqldump,mongodump,redis-cli,mariadb-dump}
      - HOOK_COMMAND_TIMEOUT=${HOOK_COMMAND_TIMEOUT:-300}
      - ALLOWED_SSH_KEY_DIRS=${ALLOWED_SSH_KEY_DIRS:-/app/data/ssh_keys,/root/.ssh}
      - ENABLE_DOCS=${ENABLE_DOCS:-false}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      # Default retention policy
      - DEFAULT_KEEP_LAST=${DEFAULT_KEEP_LAST:-3}
      - DEFAULT_KEEP_DAILY=${DEFAULT_KEEP_DAILY:-7}
      - DEFAULT_KEEP_WEEKLY=${DEFAULT_KEEP_WEEKLY:-4}
      - DEFAULT_KEEP_MONTHLY=${DEFAULT_KEEP_MONTHLY:-6}
      - DEFAULT_KEEP_YEARLY=${DEFAULT_KEEP_YEARLY:-2}
      # Advanced
      - SHUTDOWN_TIMEOUT=${SHUTDOWN_TIMEOUT:-30}
      # Komodo Integration (optional)
      - KOMODO_ENABLED=${KOMODO_ENABLED:-false}
      - KOMODO_API_URL=${KOMODO_API_URL:-}
      - KOMODO_API_KEY=${KOMODO_API_KEY:-}
      - KOMODO_API_SECRET=${KOMODO_API_SECRET:-}
    volumes:
      # Docker socket - required for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # App data (SQLite database, config)
      - backup-data:/app/data
      # Backup storage - mount your backup location here
      - ${BACKUP_PATH:-./backups}:/backups
      # Access to Docker volumes (read-only for backup)
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    ports:
      - "${PORT:-8080}:80"
    networks:
      - backup-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
      start_interval: 5s

networks:
  backup-network:
    driver: bridge

volumes:
  backup-data:
    name: dockervault-data
