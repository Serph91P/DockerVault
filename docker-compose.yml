services:
  dockervault:
    image: ghcr.io/serph91p/dockervault:latest
    container_name: dockervault
    restart: unless-stopped
    # Run as root to access Docker volumes (required for backup functionality)
    # This is necessary because Docker volumes are owned by root
    user: root
    environment:
      - TZ=${TZ:-Europe/Berlin}
      # Komodo Integration (optional)
      - KOMODO_ENABLED=${KOMODO_ENABLED:-false}
      - KOMODO_API_URL=${KOMODO_API_URL:-}
      - KOMODO_API_KEY=${KOMODO_API_KEY:-}
    volumes:
      # Docker socket - required for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # App data (SQLite database, config)
      - backup-data:/app/data
      # Backup storage - mount your backup location here
      - ${BACKUP_PATH:-./backups}:/backups
      # Access to Docker volumes (read-only for backup)
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    ports:
      - "${PORT:-8080}:80"
    networks:
      - backup-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  backup-network:
    driver: bridge

volumes:
  backup-data:
    name: dockervault-data
