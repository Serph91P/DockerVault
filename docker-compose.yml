services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backup-manager-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/backup.db
      - DOCKER_SOCKET=/var/run/docker.sock
      - BACKUP_BASE_PATH=/backups
      - TZ=Europe/Berlin
      # Komodo Integration (optional)
      - KOMODO_ENABLED=${KOMODO_ENABLED:-false}
      - KOMODO_API_URL=${KOMODO_API_URL:-}
      - KOMODO_API_KEY=${KOMODO_API_KEY:-}
      # Default retention policy (GFS - Grandfather-Father-Son)
      # These are defaults, each backup target can have its own policy
      - DEFAULT_KEEP_LAST=3
      - DEFAULT_KEEP_DAILY=7
      - DEFAULT_KEEP_WEEKLY=4
      - DEFAULT_KEEP_MONTHLY=6
      - DEFAULT_KEEP_YEARLY=2
    volumes:
      # Docker socket - read-only for security
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persistent data
      - backup-data:/app/data
      # Backup storage
      - ${BACKUP_PATH:-./backups}:/backups
      # Access to Docker volumes (read-only for backup)
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    networks:
      - backup-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/docker/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Required for Docker socket access
    group_add:
      - ${DOCKER_GID:-999}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: backup-manager-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backup-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  backup-network:
    driver: bridge

volumes:
  backup-data:
    name: backup-manager-data
