name: Release & Docker Build

on:
  workflow_run:
    workflows: ["Tests"]
    branches: [main, develop]
    types: [completed]
  push:
    branches: [main, develop]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dockervault

jobs:
  # Wait for tests to complete when triggered by push
  wait-for-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    outputs:
      tests_passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Wait for Tests workflow
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Wait up to 10 minutes for Tests workflow to complete
            const maxWait = 600000; // 10 minutes
            const checkInterval = 15000; // 15 seconds
            let waited = 0;
            
            while (waited < maxWait) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'test.yml',
                head_sha: context.sha,
                per_page: 1
              });
              
              if (runs.data.workflow_runs.length > 0) {
                const run = runs.data.workflow_runs[0];
                console.log(`Tests workflow status: ${run.status}, conclusion: ${run.conclusion}`);
                
                if (run.status === 'completed') {
                  if (run.conclusion === 'success') {
                    core.setOutput('passed', 'true');
                    return;
                  } else {
                    core.setOutput('passed', 'false');
                    core.setFailed(`Tests failed with conclusion: ${run.conclusion}`);
                    return;
                  }
                }
              }
              
              console.log(`Waiting for Tests workflow... (${waited/1000}s)`);
              await new Promise(r => setTimeout(r, checkInterval));
              waited += checkInterval;
            }
            
            core.setFailed('Timed out waiting for Tests workflow');
            core.setOutput('passed', 'false');

  prepare:
    runs-on: ubuntu-latest
    needs: [wait-for-tests]
    if: |
      always() && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
        (github.event_name == 'push' && needs.wait-for-tests.outputs.tests_passed == 'true') ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      )
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      build_env: ${{ steps.version.outputs.build_env }}
      branch_name: ${{ steps.version.outputs.branch_name }}
      docker_tags: ${{ steps.docker_meta.outputs.tags }}
      docker_labels: ${{ steps.docker_meta.outputs.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine version
        id: version
        run: |
          REF="${{ github.event_name == 'workflow_run' && format('refs/heads/{0}', github.event.workflow_run.head_branch) || github.ref }}"
          BRANCH="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}"
          
          if [[ "$REF" == refs/tags/v* ]]; then
            # Manual tag push - use the tag version directly
            VERSION=${GITHUB_REF#refs/tags/v}
            if [[ "$VERSION" == *-dev* ]] || [[ "$VERSION" == dev.* ]]; then
              IS_PRERELEASE=true
              BUILD_ENV=development
            else
              IS_PRERELEASE=false
              BUILD_ENV=production
            fi
          else
            # Auto-version: find highest version across ALL tags (dev + stable)
            HIGHEST_TAG=""
            HIGHEST_MAJOR=0
            HIGHEST_MINOR=0
            HIGHEST_PATCH=0
            
            for tag in $(git tag -l 'v*'); do
              ver="$tag"
              ver="${ver#v}"
              ver="${ver#dev.}"
              ver="${ver%%-dev*}"
              
              M=$(echo "$ver" | cut -d. -f1)
              m=$(echo "$ver" | cut -d. -f2)
              P=$(echo "$ver" | cut -d. -f3)
              
              [[ "$M" =~ ^[0-9]+$ ]] || continue
              [[ "$m" =~ ^[0-9]+$ ]] || continue
              [[ "$P" =~ ^[0-9]+$ ]] || continue
              
              if (( M > HIGHEST_MAJOR )) || \
                 (( M == HIGHEST_MAJOR && m > HIGHEST_MINOR )) || \
                 (( M == HIGHEST_MAJOR && m == HIGHEST_MINOR && P > HIGHEST_PATCH )); then
                HIGHEST_MAJOR=$M
                HIGHEST_MINOR=$m
                HIGHEST_PATCH=$P
                HIGHEST_TAG="$tag"
              fi
            done
            
            echo "Highest existing version: ${HIGHEST_MAJOR}.${HIGHEST_MINOR}.${HIGHEST_PATCH} (tag: ${HIGHEST_TAG:-none})"
            
            # Analyze commits since last tag for conventional commit bump type
            BUMP="patch"
            if [ -n "$HIGHEST_TAG" ]; then
              COMMITS=$(git log "${HIGHEST_TAG}..HEAD" --pretty=format:"%s%n%b" 2>/dev/null || echo "")
            else
              COMMITS=$(git log --pretty=format:"%s%n%b" 2>/dev/null || echo "")
            fi
            
            if echo "$COMMITS" | grep -qiE '(^[a-z]+!:|BREAKING CHANGE)'; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE '^feat(\(|:)'; then
              BUMP="minor"
            fi
            
            echo "Bump type: $BUMP"
            
            case "$BUMP" in
              major)
                NEXT_MAJOR=$((HIGHEST_MAJOR + 1))
                NEXT_MINOR=0
                NEXT_PATCH=0
                ;;
              minor)
                NEXT_MAJOR=$HIGHEST_MAJOR
                NEXT_MINOR=$((HIGHEST_MINOR + 1))
                NEXT_PATCH=0
                ;;
              patch)
                NEXT_MAJOR=$HIGHEST_MAJOR
                NEXT_MINOR=$HIGHEST_MINOR
                NEXT_PATCH=$((HIGHEST_PATCH + 1))
                ;;
            esac
            
            VERSION="${NEXT_MAJOR}.${NEXT_MINOR}.${NEXT_PATCH}"
            
            if [[ "$REF" == refs/heads/main ]]; then
              IS_PRERELEASE=false
              BUILD_ENV=production
            else
              VERSION="${VERSION}-dev"
              IS_PRERELEASE=true
              BUILD_ENV=development
            fi
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          echo "build_env=${BUILD_ENV}" >> $GITHUB_OUTPUT
          echo "branch_name=${BRANCH}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Prerelease: ${IS_PRERELEASE}, Build Env: ${BUILD_ENV}, Branch: ${BRANCH}"

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For tagged releases
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # For main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            # For develop branch
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/develop' }}
            # SHA for all
            type=sha,prefix=sha-

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.prepare.outputs.docker_tags }}
          labels: ${{ needs.prepare.outputs.docker_labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BRANCH=${{ github.ref_name }}
            BUILD_ENV=${{ needs.prepare.outputs.build_env }}

  create-release:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Create releases for tags, develop and main branch pushes
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Generate Changelog
        id: changelog
        run: |
          CURRENT_VERSION="${{ needs.prepare.outputs.version }}"
          BRANCH="${{ github.ref_name }}"
          
          # Find the last tag for changelog comparison
          if [[ "$BRANCH" == "develop" ]]; then
            LAST_TAG=$(git tag -l --sort=-creatordate | grep -E '(^vdev\.|.*-dev$)' | head -n1 || echo "")
          else
            LAST_TAG=$(git tag -l 'v*' --sort=-version:refname | grep -vE '(^vdev\.|.*-dev$)' | head -n1 || echo "")
          fi
          
          echo "Branch: $BRANCH"
          echo "Current version: $CURRENT_VERSION"
          echo "Last tag found: $LAST_TAG"
          
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s" --no-merges 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges -20 2>/dev/null || echo "")
          fi
          
          if [ -n "$COMMITS" ]; then
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "### Changes" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$COMMITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=No changes recorded for this release." >> $GITHUB_OUTPUT
          fi

      - name: Create release notes
        id: notes
        env:
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.content }}
          VERSION: ${{ needs.prepare.outputs.version }}
          BUILD_ENV: ${{ needs.prepare.outputs.build_env }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.repository }}
        run: |
          cat > release_notes.md << EOF
          ## What's Changed in ${VERSION}
          
          **Build Environment:** \`${BUILD_ENV}\`
          
          EOF
          
          if [ -n "$CHANGELOG_CONTENT" ]; then
            echo "$CHANGELOG_CONTENT" >> release_notes.md
          else
            echo "No changelog entries for this release." >> release_notes.md
          fi
          
          cat >> release_notes.md << EOF
          
          ---
          
          ## Docker Images
          
          This release is available as multi-architecture Docker images (amd64, arm64):
          
          ### Pull the image:
          \`\`\`bash
          # Specific version
          docker pull ghcr.io/${REPO_OWNER}/dockervault:${VERSION}
          
          # Or latest stable (main branch)
          docker pull ghcr.io/${REPO_OWNER}/dockervault:latest
          
          # Or development (develop branch)
          docker pull ghcr.io/${REPO_OWNER}/dockervault:dev
          \`\`\`
          
          ### Run with Docker Compose:
          \`\`\`bash
          # Download docker-compose.yml
          curl -O https://raw.githubusercontent.com/${REPO}/main/docker-compose.yml
          
          # Start services
          docker compose up -d
          \`\`\`
          
          ## Registry Information
          
          | Property | Value |
          |----------|-------|
          | Registry | GitHub Container Registry (ghcr.io) |
          | Image | \`ghcr.io/${REPO_OWNER}/dockervault\` |
          | Version | \`${VERSION}\` |
          | Environment | \`${BUILD_ENV}\` |
          | Architectures | linux/amd64, linux/arm64 |
          
          ## Documentation
          
          See the [README.md](https://github.com/${REPO}/blob/main/README.md) for full configuration options.
          EOF
          
          echo "Release notes created"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', needs.prepare.outputs.version) }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.is_prerelease == 'true' && format('Development Build {0}', needs.prepare.outputs.version) || format('Release {0}', needs.prepare.outputs.version) }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          make_latest: ${{ needs.prepare.outputs.branch_name == 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
