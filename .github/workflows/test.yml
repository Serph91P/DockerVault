name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      docker:
        image: docker:dind
        options: --privileged
        
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        
    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: Run backend tests with coverage
      working-directory: backend
      run: |
        pytest --cov=app --cov-report=xml --cov-report=html
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Archive coverage report
      uses: actions/upload-artifact@v4
      with:
        name: backend-coverage-report
        path: backend/htmlcov/

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: frontend
      run: npm ci
      
    - name: Run frontend tests with coverage
      working-directory: frontend
      run: npm run test:coverage -- --run
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        name: frontend-coverage
        token: ${{ secrets.CODECOV_TOKEN }}
        
    - name: Archive coverage report
      uses: actions/upload-artifact@v4
      with:
        name: frontend-coverage-report
        path: frontend/coverage/

  lint-and-typecheck:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        
    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Python dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
        pip install -r requirements.txt
        
    - name: Install Node dependencies
      working-directory: frontend
      run: npm ci
      
    - name: Lint Python code
      working-directory: backend
      run: ruff check app/
      
    - name: Check Python formatting
      working-directory: backend
      run: ruff format --check app/
      
    - name: Type check Python code
      working-directory: backend
      run: mypy app/ || true
      
    - name: Lint TypeScript code
      working-directory: frontend
      run: npm run lint
      
    - name: Type check TypeScript code
      working-directory: frontend
      run: npx tsc --noEmit

  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        docker build -t dockervault:test .
        
    - name: Run integration tests
      run: |
        # Run container in background
        docker run -d --name dockervault-test \
          -p 8080:80 \
          -v /var/run/docker.sock:/var/run/docker.sock:ro \
          dockervault:test
        
        # Wait for container to be healthy with retries
        echo "Waiting for container to be ready..."
        for i in {1..30}; do
          if curl -sf http://localhost:8080 > /dev/null 2>&1; then
            echo "Frontend is ready!"
            break
          fi
          echo "Attempt $i/30 - waiting..."
          sleep 2
        done
        
        # Show container logs for debugging
        echo "=== Container logs ==="
        docker logs dockervault-test
        echo "======================"
        
        # Test frontend serves correctly
        curl -f http://localhost:8080 || exit 1
        
        # Test backend health directly (internal port)
        docker exec dockervault-test curl -sf http://localhost:8000/health || echo "Backend health check not available"
        
        # Test API through frontend proxy
        curl -f http://localhost:8080/api/v1/docker/health || echo "API health check failed (may be expected without Docker socket)"
        
        # Clean up
        docker stop dockervault-test
        docker rm dockervault-test
        
    - name: Clean up
      if: always()
      run: |
        docker stop dockervault-test 2>/dev/null || true
        docker rm dockervault-test 2>/dev/null || true
        docker rmi dockervault:test 2>/dev/null || true

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.28.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
        
    - name: Run pip-audit on Python dependencies
      working-directory: backend
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt || true
        
    - name: Run npm audit on Node dependencies
      working-directory: frontend
      run: |
        npm audit --audit-level high || true

